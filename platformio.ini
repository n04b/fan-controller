; PlatformIO Project Configuration File
; Smart Fan Controller - ESP32-C3 SuperMini
;
; HomeSpan requires the ESP32 Arduino core 3.x (ESP-IDF 5.x). The stock
; `platform = espressif32` lagged on core 3.x, so the pioarduino fork is
; used here. Release 53.03.13 ships Arduino core 3.1.3; HomeSpan is pinned
; to 2.1.2 (the last release that supports core < 3.3.0). Newer pioarduino
; releases (55.x) ship .tar.xz packages and need a Python built with LZMA.

[env:esp32-c3-supermini]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board = esp32-c3-devkitm-1
framework = arduino

monitor_speed = 115200
upload_speed = 921600

; 4MB flash, "Minimal SPIFFS": 1.9MB app x2 (keeps OTA) + small FS.
; HomeSpan + ArduinoHA + WiFi exceeds the 1.25MB default app slot.
board_build.partitions = min_spiffs.csv

; USB CDC on boot so Serial logs appear over the native USB port (SuperMini).
build_flags =
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
	homespan/HomeSpan @ 2.1.2
	dawidchyrzynski/home-assistant-integration @ ^2.1.0
	mathertel/OneButton @ ^2.6.1
	knolleary/PubSubClient @ ^2.8

; --- OTA upload (after first USB flash) -----------------------------------
; Uncomment and set the device IP to flash over the network:
; upload_protocol = espota
; upload_port = 192.168.1.50
; upload_flags =
; 	--auth=fan-ota-2024
